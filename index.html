<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Face AI System</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <h1>Face Recognition System</h1>
</header>

<div class="container">

    <!-- REGISTER -->
    <div class="card">
        <h2>Đăng ký khuôn mặt</h2>

        <input id="name" placeholder="Nhập tên">
        <input type="file" id="file_reg" accept="image/*">

        <img id="preview_reg" class="preview">

        <button onclick="register()">Đăng ký</button>

        <p id="reg_result"></p>
    </div>

    <!-- RECOGNIZE -->
    <div class="card">
        <h2>Test nhận diện</h2>

        <input type="file" id="file_rec" accept="image/*">

        <img id="preview_rec" class="preview">

        <button onclick="recognize()">Nhận diện</button>

        <p id="rec_result"></p>
    </div>

    <!-- LOGS -->
    <div class="card full">
        <h2>Lịch sử check-in</h2>

        <button onclick="loadLogs()">Refresh</button>

        <table>
            <thead>
                <tr>
                    <th>Tên</th>
                    <th>Thời gian</th>
                </tr>
            </thead>
            <tbody id="log_table"></tbody>
        </table>
    </div>

</div>

<script src="app.js"></script>

</body>
</html>
